<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    
    <div class="container">
        <div class="calculator">
            <form>
                
                    <input type="text" id="Display" name="display">
                
                <div class="buttons">
                    <button type="button" onclick="clearDisplay()" class="clear">AC</button>
                    <button type="button" onclick="deleteLast()" class="delete">DEL</button>
                    <button type="button" onclick="appendToDisplay('.')" class="decimal">.</button>
                    <button type="button" onclick="appendToDisplay('/')" class="divide">/</button>
                </div>
                <div class="buttons">
                    <button type="button" onclick="appendToDisplay('7')" class="number">7</button>
                    <button type="button" onclick="appendToDisplay('8')" class="number">8</button>
                    <button type="button" onclick="appendToDisplay('9')" class="number">9</button>
                    <button type="button" onclick="appendToDisplay('*')" class="multiply">*</button>
                </div>
                <div class="buttons">
                    <button type="button" onclick="appendToDisplay('4')" class="number">4</button>
                    <button type="button" onclick="appendToDisplay('5')" class="number">5</button>
                    <button type="button" onclick="appendToDisplay('6')" class="number">6</button>
                    <button type="button" onclick="appendToDisplay('-')" class="subtract">-</button>
                </div>
                <div class="buttons">
                    <button type="button" onclick="appendToDisplay('1')" class="number">1</button>
                    <button type="button" onclick="appendToDisplay('2')" class="number">2</button>
                    <button type="button" onclick="appendToDisplay('3')" class="number">3</button>
                    <button type="button" onclick="appendToDisplay('+')" class="add">+</button>
                </div>
                <div class="buttons">
                    <button type="button" onclick="appendToDisplay('00')" class="doublezero">00</button>
                    <button type="button" onclick="appendToDisplay('0')" class="zero">0</button>
                    <button type="button" onclick="calculate()" class="equal">=</button>
                </div>
                

            </form>
        </div>
        
    </div>
    
<script src="script.js"></script>
</body>
</html>
